<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penguin Fashion</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google font Link=========== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <style>
      .bebas {
        font-family: "Bebas Neue";
        font-weight: 400;
        font-style: normal;
      }

      .roboto {
        font-family: "Roboto", sans-serif;
        font-optical-sizing: auto;
        font-weight: weight;
        font-style: normal;
      }
    </style>
  </head>
  <body class="">
    <nav></nav>
    <header class="bg-[#FFFBF0] flex items-center justify-around">
      <div>
        <h1 class="bebas text-7xl text-[#FABE4C] w-96">
          Be the Penguins <span class="text-[#363958]">of Winter</span>
        </h1>
        <p class="roboto w-[357px] text-[#3E3E3E] font-normal text-[16px] mb-2">
          Lorem Ipsum is simply dummy text of the printing and typesetting
          industry.
        </p>
        <button
          class="roboto text-[#FFFFFF] text-xs font-medium items-center text-center bg-linear-to-r from-[#A4BC46] to-[#85A019] w-36 h-16 rounded-lg p-4 flex gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="white"
            viewBox="0 0 24 24"
            strokeWidth="{1.5}"
            stroke="currentColor"
            className="size-6"
            class="w-6 h-6"
          >
            <path
              strokeLinecap="round"
              strokeLinejoin="round"
              d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"
            />
          </svg>

          BUY NOW
        </button>
      </div>
      <img src="images/model.png" alt="" />
    </header>
    <main></main>
    <footer></footer>
  </body>
</html>
